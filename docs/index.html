<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projekt Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen text-slate-100 p-3 md:p-5">

  <div class="max-w-5xl mx-auto">

    <!-- Kopfzeile -->
    <div class="flex items-center justify-between mb-5 gap-3">
      <div>
        <h1 class="text-lg font-bold text-slate-100">📡 Projekt Monitor</h1>
        <p id="lastRun" class="text-xs text-slate-500 mt-0.5">Lade Status...</p>
      </div>
      <div class="bg-slate-800 rounded-lg px-4 py-2 text-center shrink-0">
        <div id="summary" class="text-xl font-bold text-green-400">—</div>
        <div class="text-xs text-slate-500">Datenbanken online</div>
      </div>
    </div>

    <!-- Website-Status -->
    <div class="mb-6">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Website-Status</h2>
        <button id="webRefreshBtn" onclick="refreshWebsites()"
          class="flex items-center gap-1 px-2.5 py-1 rounded-md bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-200 transition-colors text-xs">
          <span id="webRefreshIcon">↻</span>
          <span>Prüfen</span>
        </button>
      </div>
      <div id="webGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2.5"></div>
    </div>

    <!-- Fehlermeldung Datenbank -->
    <div id="dbError" class="hidden bg-red-950 border border-red-800 text-red-300 rounded-lg p-3 mb-4 text-xs"></div>

    <!-- Datenbank-Status -->
    <div class="mb-6">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Datenbank-Status</h2>
        <div class="flex items-center gap-2">
          <button id="pingBtn" onclick="triggerPing()"
            class="flex items-center gap-1 px-2.5 py-1 rounded-md bg-indigo-900 hover:bg-indigo-800 text-indigo-300 hover:text-indigo-100 transition-colors text-xs">
            <span id="pingIcon">▶</span>
            <span id="pingLabel">Ping auslösen</span>
          </button>
          <button id="dbRefreshBtn" onclick="refreshDb()"
            class="flex items-center gap-1 px-2.5 py-1 rounded-md bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-200 transition-colors text-xs">
            <span id="dbRefreshIcon">↻</span>
            <span>Anzeige</span>
          </button>
        </div>
      </div>
      <div id="dbGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2.5"></div>
    </div>

    <!-- Fußzeile -->
    <div class="pt-3 border-t border-slate-800 text-xs text-slate-600 flex flex-wrap justify-between gap-2">
      <span>DB-Ping alle 3 Tage via GitHub Actions · Website-Check im Browser · <button onclick="resetToken()" class="underline hover:text-slate-400 transition-colors">Token zurücksetzen</button></span>
      <span id="nextPing">Nächster Ping: —</span>
    </div>

  </div>

  <script>
    // Zeitstempel ins Deutsche formatieren
    function formatTimestamp(iso) {
      if (!iso) return '—';
      return new Intl.DateTimeFormat('de-DE', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      }).format(new Date(iso));
    }

    // XSS-Schutz
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Provider-Badge (Supabase / Neon / etc.)
    function providerBadge(provider) {
      if (!provider) return '';
      const styles = {
        'Supabase': 'bg-emerald-950 text-emerald-400',
        'Neon':     'bg-sky-950 text-sky-400',
      };
      const cls = styles[provider] ?? 'bg-slate-700 text-slate-400';
      return `<span class="text-xs px-1.5 py-0.5 rounded-full ${cls}">${escapeHtml(provider)}</span>`;
    }

    // Datenbank-Karte rendern
    function renderDbCard(project) {
      const isOk = project.status === 'ok';
      const borderColor = isOk ? 'border-green-500' : 'border-red-500';
      const badgeBg = isOk ? 'bg-green-950 text-green-400' : 'bg-red-950 text-red-400';
      const badgeText = isOk ? 'ONLINE' : 'FEHLER';
      const responseTime = project.responseTime != null ? `${project.responseTime} ms` : '—';
      const httpStatus = project.httpStatus ?? '—';
      const checkedAt = formatTimestamp(project.lastChecked);

      return `
        <div class="bg-slate-800 rounded-lg p-3 border-l-4 ${borderColor}">
          <div class="flex items-center justify-between mb-2 gap-2">
            <div class="flex items-center gap-1.5 min-w-0">
              <span class="font-semibold text-slate-100 text-xs leading-snug truncate">${escapeHtml(project.name)}</span>
              ${providerBadge(project.provider)}
            </div>
            <span class="shrink-0 text-xs font-medium px-1.5 py-0.5 rounded-full ${badgeBg}">${badgeText}</span>
          </div>
          <div class="flex gap-4 text-xs">
            <div>
              <div class="text-slate-500">Zeit</div>
              <div class="font-semibold ${isOk ? 'text-slate-100' : 'text-red-400'}">${responseTime}</div>
            </div>
            <div>
              <div class="text-slate-500">HTTP</div>
              <div class="font-semibold ${isOk ? 'text-slate-100' : 'text-red-400'}">${httpStatus}</div>
            </div>
            <div class="min-w-0">
              <div class="text-slate-500">Geprüft</div>
              <div class="text-slate-400 truncate">${checkedAt}</div>
            </div>
          </div>
          ${!isOk && project.error ? `<div class="mt-1.5 text-xs text-red-400 truncate">${escapeHtml(project.error)}</div>` : ''}
        </div>
      `;
    }

    // Website-Karte rendern (Placeholder während Prüfung läuft)
    function renderWebCardPending(name, url) {
      return `
        <div class="bg-slate-800 rounded-lg p-3 border-l-4 border-slate-600" id="webcard-${btoa(url).replace(/=/g, '')}">
          <div class="flex items-center justify-between mb-1.5 gap-2">
            <div class="flex items-center gap-1.5 min-w-0">
              <span class="font-semibold text-slate-100 text-xs leading-snug truncate">${escapeHtml(name)}</span>
              <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer"
                class="shrink-0 text-xs text-slate-400 hover:text-slate-200 transition-colors" title="Seite öffnen">↗</a>
            </div>
            <span class="shrink-0 text-xs font-medium px-1.5 py-0.5 rounded-full bg-slate-700 text-slate-400">PRÜFE…</span>
          </div>
          <div class="text-xs text-slate-500 truncate">${escapeHtml(url)}</div>
        </div>
      `;
    }

    function renderWebCardResult(name, url, responseTime, status) {
      const cfg = {
        ok:      { border: 'border-green-500', badge: 'bg-green-950 text-green-400',  label: 'ERREICHBAR',    timeColor: 'text-slate-100', hint: '' },
        timeout: { border: 'border-red-500',   badge: 'bg-red-950 text-red-400',     label: 'TIMEOUT',       timeColor: 'text-red-400',   hint: 'Server hat nicht innerhalb von 15s geantwortet.' },
        blocked: { border: 'border-slate-600', badge: 'bg-slate-700 text-slate-400', label: 'NICHT PRÜFBAR', timeColor: 'text-slate-400', hint: 'Browser-Sicherheit verhindert den Check. ↗ manuell prüfen.' },
      }[status] ?? cfg.blocked;
      const timeText = responseTime != null ? `${responseTime} ms` : '—';

      return `
        <div class="bg-slate-800 rounded-lg p-3 border-l-4 ${cfg.border}">
          <div class="flex items-center justify-between mb-1.5 gap-2">
            <div class="flex items-center gap-1.5 min-w-0">
              <span class="font-semibold text-slate-100 text-xs leading-snug truncate">${escapeHtml(name)}</span>
              <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer"
                class="shrink-0 text-xs text-slate-400 hover:text-slate-200 transition-colors" title="Seite öffnen">↗</a>
            </div>
            <span class="shrink-0 text-xs font-medium px-1.5 py-0.5 rounded-full ${cfg.badge}">${cfg.label}</span>
          </div>
          <div class="flex gap-4 text-xs">
            <div>
              <div class="text-slate-500">Zeit</div>
              <div class="font-semibold ${cfg.timeColor}">${timeText}</div>
            </div>
            <div class="min-w-0">
              <div class="text-slate-500">URL</div>
              <div class="text-slate-400 truncate">${escapeHtml(url)}</div>
            </div>
          </div>
          ${cfg.hint ? `<div class="mt-1.5 text-xs text-slate-500">${cfg.hint}</div>` : ''}
        </div>
      `;
    }

    // Fallback: favicon.ico per <img> laden — umgeht Sec-Fetch-Dest:empty-Blocks mancher Server
    function pingViaImage(origin, timeoutMs) {
      return new Promise((resolve) => {
        const start = performance.now();
        const img = new Image();
        let settled = false;
        const finish = (ok) => {
          if (settled) return;
          settled = true;
          clearTimeout(timer);
          resolve({ ok, elapsed: Math.round(performance.now() - start) });
        };
        // onerror kann "Server antwortet mit 404" ODER "Netzwerkfehler" bedeuten.
        // Heuristik: Netzwerkfehler (DNS/refused) kommen in <150ms zurück;
        // echte HTTP-Antworten brauchen länger → dann als "erreichbar" werten.
        const timer = setTimeout(() => finish(false), timeoutMs);
        img.onload = () => finish(true);
        img.onerror = () => {
          const elapsed = performance.now() - start;
          finish(elapsed > 150);
        };
        img.src = `${origin}/favicon.ico?_=${Date.now()}`;
      });
    }

    // Website pingen: zuerst fetch (no-cors), bei Blockierung Bild-Fallback
    // Rückgabe: { responseTime, status: 'ok' | 'timeout' | 'blocked' }
    async function pingWebsite(url) {
      const start = performance.now();
      const origin = new URL(url).origin;
      try {
        await fetch(url, { mode: 'no-cors', signal: AbortSignal.timeout(15_000) });
        return { responseTime: Math.round(performance.now() - start), status: 'ok' };
      } catch (fetchErr) {
        const isTimeout = fetchErr.name === 'TimeoutError' || fetchErr.name === 'AbortError';
        if (isTimeout) {
          return { responseTime: null, status: 'timeout' };
        }
        // fetch geblockt → Bild-Fallback versuchen
        const remaining = 15_000 - Math.round(performance.now() - start);
        const { ok } = await pingViaImage(origin, Math.max(remaining, 5_000));
        if (ok) {
          return { responseTime: Math.round(performance.now() - start), status: 'ok' };
        }
        // Beides gescheitert — Browser kann diese URL nicht prüfen
        return { responseTime: null, status: 'blocked' };
      }
    }

    // Datenbank-Status aus status.json laden
    let lastProjects = [];

    async function loadDbStatus() {
      try {
        const res = await fetch('./status.json?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById('dbError').classList.add('hidden');

        lastProjects = data.projects ?? [];

        const online = lastProjects.filter(p => p.status === 'ok').length;
        const total = lastProjects.length;
        const summaryEl = document.getElementById('summary');
        summaryEl.textContent = `${online} / ${total}`;
        summaryEl.className = `text-2xl font-bold ${online === total ? 'text-green-400' : online === 0 ? 'text-red-400' : 'text-yellow-400'}`;

        document.getElementById('lastRun').textContent =
          data.lastRun ? `Letzter DB-Run: ${formatTimestamp(data.lastRun)}` : 'Noch kein Run';

        if (data.lastRun) {
          const next = new Date(new Date(data.lastRun).getTime() + 3 * 24 * 60 * 60 * 1000);
          document.getElementById('nextPing').textContent = `Nächster Ping: ${formatTimestamp(next.toISOString())}`;
        }

        document.getElementById('dbGrid').innerHTML =
          lastProjects.length > 0
            ? lastProjects.map(renderDbCard).join('')
            : '<p class="text-slate-500 col-span-2 text-sm">Noch keine Projekte konfiguriert.</p>';

      } catch (err) {
        document.getElementById('dbError').textContent = `Fehler beim Laden: ${err.message}`;
        document.getElementById('dbError').classList.remove('hidden');
      }
    }

    // Alle Websites live prüfen
    async function checkWebsites() {
      const websites = lastProjects.filter(p => p.frontendUrl);

      if (websites.length === 0) {
        document.getElementById('webGrid').innerHTML =
          '<p class="text-slate-500 col-span-2 text-sm">Keine Frontend-URLs konfiguriert.</p>';
        return;
      }

      // Zuerst alle Karten als "Prüfe..." anzeigen
      document.getElementById('webGrid').innerHTML =
        websites.map(p => renderWebCardPending(p.name, p.frontendUrl)).join('');

      // Dann parallel alle Websites pingen und Karten einzeln aktualisieren
      await Promise.all(websites.map(async (project) => {
        const { responseTime, status } = await pingWebsite(project.frontendUrl);
        const cardHtml = renderWebCardResult(project.name, project.frontendUrl, responseTime, status);
        const id = `webcard-${btoa(project.frontendUrl).replace(/=/g, '')}`;
        const el = document.getElementById(id);
        if (el) el.outerHTML = cardHtml;
      }));
    }

    // Button-Spin-Animation
    function withSpin(btnId, iconId, fn) {
      return async () => {
        const btn = document.getElementById(btnId);
        const icon = document.getElementById(iconId);
        btn.disabled = true;
        icon.style.display = 'inline-block';
        icon.style.animation = 'spin 0.8s linear infinite';
        await fn();
        icon.style.animation = '';
        btn.disabled = false;
      };
    }

    const refreshDb = withSpin('dbRefreshBtn', 'dbRefreshIcon', loadDbStatus);
    const refreshWebsites = withSpin('webRefreshBtn', 'webRefreshIcon', checkWebsites);

    // GitHub Workflow Trigger
    const REPO = 'chrkin-g/project-monitor';
    const WORKFLOW = 'keepalive.yml';

    function getToken() {
      let token = localStorage.getItem('gh_token');
      if (!token) {
        token = prompt('GitHub Personal Access Token eingeben\n(Scope: workflow — wird nur lokal im Browser gespeichert):');
        if (token) localStorage.setItem('gh_token', token.trim());
      }
      return token ? token.trim() : null;
    }

    function resetToken() {
      localStorage.removeItem('gh_token');
      alert('Token gelöscht. Beim nächsten Ping wird er neu abgefragt.');
    }

    function setPingState(icon, label, disabled, spin = false) {
      const btn = document.getElementById('pingBtn');
      const iconEl = document.getElementById('pingIcon');
      const labelEl = document.getElementById('pingLabel');
      btn.disabled = disabled;
      iconEl.textContent = icon;
      iconEl.style.animation = spin ? 'spin 0.8s linear infinite' : '';
      labelEl.textContent = label;
    }

    async function pollWorkflow(token, triggeredAt) {
      for (let i = 0; i < 25; i++) {
        await new Promise(r => setTimeout(r, 6_000));
        try {
          const res = await fetch(
            `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=5`,
            { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' } }
          );
          const data = await res.json();
          const run = (data.workflow_runs ?? []).find(r => new Date(r.created_at) >= triggeredAt);
          if (run?.status === 'completed') return run.conclusion;
        } catch { /* weiter versuchen */ }
      }
      return null;
    }

    async function triggerPing() {
      const token = getToken();
      if (!token) return;

      setPingState('…', 'Starte…', true, false);

      try {
        const triggeredAt = new Date();
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ ref: 'main' })
          }
        );

        if (res.status === 401 || res.status === 403) {
          localStorage.removeItem('gh_token');
          setPingState('✗', 'Token ungültig', true);
          setTimeout(() => setPingState('▶', 'Ping auslösen', false), 3_000);
          return;
        }
        if (res.status !== 204) {
          setPingState('✗', `Fehler (${res.status})`, true);
          setTimeout(() => setPingState('▶', 'Ping auslösen', false), 3_000);
          return;
        }

        setPingState('↻', 'Läuft…', true, true);
        const conclusion = await pollWorkflow(token, triggeredAt);

        if (conclusion === 'success' || conclusion === 'failure') {
          setPingState('✓', 'Fertig — lade…', true);
          await loadDbStatus();
          await checkWebsites();
        } else {
          setPingState('⏳', 'Läuft noch…', true);
        }
        setTimeout(() => setPingState('▶', 'Ping auslösen', false), 3_000);

      } catch {
        setPingState('✗', 'Netzwerkfehler', true);
        setTimeout(() => setPingState('▶', 'Ping auslösen', false), 3_000);
      }
    }

    // Beim Laden: DB-Status sofort, Websites nach DB-Daten
    loadDbStatus().then(checkWebsites);
  </script>

</body>
</html>
